name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-opencode:
    name: Build OpenCode binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - name: Checkout OpenCode fork
        uses: actions/checkout@v4
        with:
          repository: ClintonSarkar/opencode

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        env:
          GOOS: ${{ contains(matrix.target, 'linux') && 'linux' || 'windows' }}
          GOARCH: ${{ contains(matrix.target, 'arm64') && 'arm64' || 'amd64' }}
        run: |
          go build -o opencode-${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: opencode-${{ matrix.target }}*

  publish-cli:
    name: Publish clawde CLI to PyPI
    runs-on: ubuntu-latest
    needs: build-opencode
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*
